version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: sa-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:12330:3306"
    environment:
      MYSQL_ROOT_PASSWORD: SA_MySQL_R00t_P@ss2024!Secure#
      MYSQL_DATABASE: smart_agriculture
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sa-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:12331:3000"
    environment:
      NODE_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: SA_MySQL_R00t_P@ss2024!Secure#
      DB_NAME: smart_agriculture
      JWT_SECRET: SA_JWT_Secret_K3y_2024!Pr0ducti0n#Secure
      JWT_EXPIRES_IN: 7d
      ADMIN_PASSWORD: Adm1n_P@ss2024!Secure#
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sa-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:12332:80"
    depends_on:
      - backend

volumes:
  mysql_data:

networks:
  default:
    name: sa-network
